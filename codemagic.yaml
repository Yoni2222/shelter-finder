workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.shelterfinder.app
      vars:
        XCODE_WORKSPACE: "client/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.shelterfinder.app"
      node: 18
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Node dependencies
        script: |
          cd client
          npm install

      - name: Build web assets
        script: |
          cd client
          CAPACITOR=true npx vite build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install xcodeproj gem
        script: |
          gem install xcodeproj

      - name: Add Notification Service Extension target
        script: |
          ruby scripts/setup-ios-extension.rb

      - name: Install CocoaPods (if needed)
        script: |
          cd client/ios/App
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          cd client/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - client/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log


  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      android_signing:
        - shelter_finder_keystore
      vars:
        PACKAGE_NAME: "com.shelterfinder.app"
      node: 18
      java: 17

    scripts:
      - name: Install Node dependencies
        script: |
          cd client
          npm install

      - name: Build web assets
        script: |
          cd client
          CAPACITOR=true npx vite build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync android

      - name: Build Android APK
        script: |
          cd client/android
          ./gradlew assembleRelease

    artifacts:
      - client/android/app/build/outputs/**/*.apk
      - client/android/app/build/outputs/**/mapping.txt
