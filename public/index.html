<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מאתר מקלטים / Shelter Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 100%);
      color: white;
      padding: 13px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,.35);
      flex-shrink: 0;
      z-index: 100;
    }
    .hdr-icon { font-size: 28px; line-height: 1; }
    .hdr-text h1 { font-size: 19px; font-weight: 700; }
    .hdr-text p  { font-size: 11px; opacity: .8; margin-top: 2px; }
    .hdr-right {
      margin-inline-start: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hdr-badge {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      white-space: nowrap;
    }
    .lang-btn {
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.5);
      color: white;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      font-family: inherit;
      letter-spacing: 0.5px;
    }
    .lang-btn:hover { background: rgba(255,255,255,.28); }

    /* ── Search bar ── */
    .search-bar {
      background: white;
      padding: 11px 18px;
      display: flex;
      gap: 9px;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      flex-shrink: 0;
      flex-wrap: wrap;
      z-index: 50;
    }
    .input-wrap { position: relative; flex: 1; min-width: 220px; }
    .search-input {
      width: 100%;
      padding: 10px 38px 10px 13px;
      border: 2px solid #dde2ec;
      border-radius: 9px;
      font-size: 15px;
      font-family: inherit;
      background: #f8fafc;
      transition: border-color .22s;
    }
    html[dir="ltr"] .search-input { padding: 10px 13px 10px 38px; }
    .search-input:focus { outline: none; border-color: #2563eb; background: #fff; }
    .search-icon {
      position: absolute;
      inset-inline-end: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 16px;
      pointer-events: none;
    }

    /* Autocomplete */
    .suggestions {
      position: absolute; top: calc(100% + 4px); inset-inline-start: 0; inset-inline-end: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 9px;
      box-shadow: 0 8px 25px rgba(0,0,0,.12);
      z-index: 1000; overflow: hidden; display: none;
    }
    .sug-item {
      padding: 10px 14px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid #f1f5f9; transition: background .14s;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover { background: #f0f7ff; }

    /* Buttons */
    .btn {
      padding: 10px 15px; border: none; border-radius: 9px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      font-family: inherit; white-space: nowrap;
      transition: all .2s; display: flex; align-items: center; gap: 5px;
    }
    .btn-search { background: #2563eb; color: #fff; box-shadow: 0 2px 6px rgba(37,99,235,.35); }
    .btn-search:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn-gps { background: #f0fdf4; color: #16a34a; border: 2px solid #16a34a; }
    .btn-gps:hover { background: #16a34a; color: #fff; }
    .btn-gps:disabled { opacity: .5; cursor: not-allowed; }

    /* Radius */
    .radius-wrap { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #64748b; }
    .radius-sel {
      padding: 9px 9px; border: 2px solid #dde2ec; border-radius: 9px;
      font-size: 13px; background: #f8fafc; cursor: pointer; font-family: inherit;
      transition: border-color .2s;
    }
    .radius-sel:focus { outline: none; border-color: #2563eb; }

    /* ── Category filter bar ── */
    .cat-bar {
      background: #f8fafc;
      padding: 7px 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .cat-bar-label { font-size: 12px; color: #64748b; white-space: nowrap; }
    .cat-btn {
      padding: 4px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      background: #fff;
      color: #94a3b8;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cat-btn.active { color: #fff; border-color: transparent; }
    .cat-btn.active.cat-public  { background: #16a34a; }
    .cat-btn.active.cat-school  { background: #7c3aed; }
    .cat-btn.active.cat-parking { background: #d97706; }
    .cat-note {
      font-size: 10px;
      color: #94a3b8;
      margin-inline-start: auto;
      font-style: italic;
    }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: 360px; background: #fff;
      display: flex; flex-direction: column;
      border-inline-start: 1px solid #e2e8f0;
      overflow: hidden; flex-shrink: 0;
    }
    .sidebar-hdr {
      padding: 13px 17px; background: #f8fafc;
      border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
    }
    .sidebar-hdr h2 { font-size: 14px; color: #1e40af; font-weight: 700; }
    .sidebar-hdr .sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .shelter-list { flex: 1; overflow-y: auto; }
    .shelter-list::-webkit-scrollbar { width: 4px; }
    .shelter-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    /* ── Shelter card ── */
    .card {
      padding: 12px 15px; border-bottom: 1px solid #f1f5f9;
      cursor: pointer; transition: background .14s;
      display: flex; gap: 11px; align-items: flex-start;
    }
    .card:hover { background: #f8faff; }
    .card.active { background: #f0fdf4; border-inline-start: 3px solid #16a34a; }
    .card.active.cat-school  { background: #f5f3ff; border-inline-start-color: #7c3aed; }
    .card.active.cat-parking { background: #fff7ed; border-inline-start-color: #d97706; }

    .rank {
      width: 27px; height: 27px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .rank.near   { background: #16a34a; }
    .rank.medium { background: #d97706; }
    .rank.far    { background: #9ca3af; }
    .rank.school  { background: #7c3aed; }
    .rank.parking { background: #ea580c; }

    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 700; font-size: 14px; color: #1e293b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-addr {
      font-size: 12px; color: #64748b; margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta { display: flex; align-items: center; gap: 7px; margin-top: 6px; flex-wrap: wrap; }
    .pill { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .pill-dist         { background: #dbeafe; color: #1d4ed8; }
    .pill-dist.near    { background: #dcfce7; color: #15803d; }
    .pill-dist.medium  { background: #fef3c7; color: #b45309; }
    .pill-dist.far     { background: #f1f5f9; color: #64748b; }
    .pill-tag          { background: #f1f5f9; color: #475569; font-weight: 400; }
    .pill-school       { background: #f5f3ff; color: #6d28d9; }
    .pill-parking      { background: #fff7ed; color: #c2410c; }

    .nav-links { margin-top: 6px; display: flex; gap: 12px; }
    .nav-link {
      font-size: 11px; color: #2563eb; text-decoration: none;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .nav-link:hover { text-decoration: underline; }

    /* ── States ── */
    .state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 36px 20px; text-align: center;
      color: #94a3b8; height: 100%;
    }
    .state-icon  { font-size: 46px; margin-bottom: 12px; opacity: .5; }
    .state-title { font-size: 14px; font-weight: 600; color: #64748b; }
    .state-sub   { font-size: 12px; margin-top: 6px; line-height: 1.55; }

    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px; color: #64748b; height: 100%;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #dbeafe; border-top-color: #2563eb;
      border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 13px; }

    .err-box {
      margin: 12px; padding: 12px 14px;
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 9px; color: #b91c1c; font-size: 13px; line-height: 1.5;
    }

    /* ── Data notice ── */
    .data-notice {
      padding: 7px 15px; background: #fffbeb;
      border-top: 1px solid #fde68a; font-size: 11px;
      color: #92400e; flex-shrink: 0; text-align: center; line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      body { overflow: auto; }
      .main { flex-direction: column; height: auto; }
      #map  { height: 300px; }
      .sidebar { width: 100%; max-height: 380px; border-inline-start: none; border-top: 1px solid #e2e8f0; }
      .hdr-badge { display: none; }
      .cat-note  { display: none; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="hdr-icon">🏚️</div>
  <div class="hdr-text">
    <h1 data-i18n="appTitle">מאתר מקלטים ציבוריים</h1>
    <p data-i18n="appSubtitle">הכנס כתובת או השתמש ב-GPS לאיתור מקלטים קרובים</p>
  </div>
  <div class="hdr-right">
    <div class="hdr-badge" data-i18n="hdrBadge">🛡️ OSM · gov.il · ארצי</div>
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</header>

<!-- Search -->
<div class="search-bar">
  <div class="input-wrap">
    <span class="search-icon">🔍</span>
    <input id="addr" type="text" class="search-input"
           data-i18n-ph="searchPlaceholder"
           placeholder="הכנס כתובת (למשל: שדרות רוטשילד 1, תל אביב)…"
           autocomplete="off"/>
    <div class="suggestions" id="sug"></div>
  </div>
  <button class="btn btn-search" onclick="doSearch()">
    <span data-i18n="searchBtn">חפש</span>
  </button>
  <button class="btn btn-gps" id="gps-btn" onclick="useGPS()">
    <span>📍</span><span data-i18n="gpsBtn">מיקום נוכחי</span>
  </button>
  <div class="radius-wrap">
    <label for="radius" data-i18n="radiusLabel">טווח:</label>
    <select id="radius" class="radius-sel" onchange="onRadiusChange()"></select>
  </div>
</div>

<!-- Category filter bar -->
<div class="cat-bar">
  <span class="cat-bar-label" data-i18n="catLabel">הצג:</span>
  <button class="cat-btn cat-public active" id="cat-public" onclick="toggleCat('public',this)"
          title="מקלטים ציבוריים ומרחבים מוגנים">
    <span>🏚️</span><span data-i18n="catPublic">מקלטים</span>
  </button>
  <button class="cat-btn cat-school active" id="cat-school" onclick="toggleCat('school',this)"
          title="בתי ספר וגני ילדים — עשויים לשמש מרחב מוגן">
    <span>🏫</span><span data-i18n="catSchool">בתי ספר</span>
  </button>
  <button class="cat-btn cat-parking active" id="cat-parking" onclick="toggleCat('parking',this)"
          title="חניונים מקורים ורב-קומתיים — עשויים לשמש מרחב מוגן">
    <span>🅿️</span><span data-i18n="catParking">חניונים</span>
  </button>
  <span class="cat-note" data-i18n="catNote">🏫 ו-🅿️ — מרחבים מוגנים פוטנציאליים</span>
</div>

<!-- Main -->
<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-hdr">
      <h2 id="result-ttl" data-i18n="sidebarTitle">המקלטים הקרובים אליך</h2>
      <div class="sub" id="result-sub" data-i18n="sidebarSub">הכנס כתובת או לחץ "מיקום נוכחי"</div>
    </div>
    <div class="shelter-list" id="list">
      <div class="state">
        <div class="state-icon">🗺️</div>
        <div class="state-title" data-i18n="emptyTitle">טרם בוצע חיפוש</div>
        <div class="state-sub" data-i18n="emptySub">הכנס כתובת בשדה למעלה<br>או לחץ על "מיקום נוכחי"</div>
      </div>
    </div>
    <div class="data-notice" id="data-notice" style="display:none"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════
// TRANSLATIONS
// ═══════════════════════════════════
const STRINGS = {
  he: {
    dir: 'rtl', lang: 'he',
    appTitle:       'מאתר מקלטים ציבוריים',
    appSubtitle:    'הכנס כתובת או השתמש ב-GPS לאיתור מקלטים קרובים',
    hdrBadge:       '🛡️ OSM · gov.il · ארצי',
    searchPlaceholder: 'הכנס כתובת (למשל: שדרות רוטשילד 1, תל אביב)…',
    searchBtn:      'חפש',
    gpsBtn:         'מיקום נוכחי',
    radiusLabel:    'טווח:',
    radiusOpts:     [['500','500 מ\''],['1000','1 ק"מ'],['2000','2 ק"מ'],['5000','5 ק"מ'],['10000','10 ק"מ']],
    catLabel:       'הצג:',
    catPublic:      'מקלטים',
    catSchool:      'בתי ספר',
    catParking:     'חניונים',
    catNote:        '🏫 ו-🅿️ — מרחבים מוגנים פוטנציאליים',
    sidebarTitle:   'המקלטים הקרובים אליך',
    sidebarSub:     'הכנס כתובת או לחץ "מיקום נוכחי"',
    emptyTitle:     'טרם בוצע חיפוש',
    emptySub:       'הכנס כתובת בשדה למעלה<br>או לחץ על "מיקום נוכחי"',
    noResults:      'לא נמצאו תוצאות בטווח זה',
    noResultsSub:   'נסה להגדיל את טווח החיפוש<br>או לבדוק כתובת אחרת',
    foundX:     n   => `נמצאו ${n} תוצאות`,
    inRadius:   r   => `בטווח ${r}`,
    govLabel:   n   => `${n} ממסד ממשלתי`,
    osmLabel:   n   => `${n} מ-OSM`,
    dataNotice:     '🏚️ מקלטים: OSM + מאגר ארצי + gov.il (שלם לבאר שבע · ירושלים · <strong>תל אביב</strong>). 🏫🅿️ בתי ספר וחניונים: נתוני OSM — <strong>מרחבים מוגנים פוטנציאליים בלבד</strong>.',
    myLocation:     '📍 מיקומך',
    gpsDetected:    '📍 מיקום GPS זוהה',
    detectingGPS:   '⏳',
    detecting:      'מזהה…',
    searchingAddr:  'מחפש כתובת…',
    searchingFmt:   r => `מחפש בטווח ${r}…`,
    addrNotFound:   'הכתובת לא נמצאה – נסה להיות יותר מפורט (עיר + רחוב + מספר)',
    noGeo:          'הדפדפן אינו תומך בזיהוי מיקום',
    geoDenied:      'גישה נדחתה – אשר גישה למיקום בדפדפן',
    geoUnavail:     'המיקום אינו זמין',
    geoTimeout:     'פסק זמן',
    geoErr:         'שגיאה בזיהוי מיקום',
    enterAddr:      'אנא הכנס כתובת לחיפוש',
    loadErr:        'שגיאה בטעינת נתונים: ',
    geoSearchErr:   'שגיאת חיפוש: ',
    distFmt:   km   => km < 1 ? `${Math.round(km*1000)} מ'` : `${km.toFixed(1)} ק"מ`,
    popupDist:      'מרחק:',
    govBadge:       '🏛️ gov.il',
    arcgisBadge:    '🏛️ ארצי',
    osmBadge:       '🗺️ OSM',
    schoolBadge:    '🏫 בית ספר',
    parkingBadge:   '🅿️ חניון',
    wazeLabel:      '🗺️ Waze',
    gmapsLabel:     '📍 Google Maps',
  },
  en: {
    dir: 'ltr', lang: 'en',
    appTitle:       'Public Shelter Finder',
    appSubtitle:    'Enter an address or use GPS to find nearby shelters',
    hdrBadge:       '🛡️ OSM · gov.il · National DB',
    searchPlaceholder: 'Enter address (e.g. 1 Rothschild Blvd, Tel Aviv)…',
    searchBtn:      'Search',
    gpsBtn:         'My Location',
    radiusLabel:    'Radius:',
    radiusOpts:     [['500','500 m'],['1000','1 km'],['2000','2 km'],['5000','5 km'],['10000','10 km']],
    catLabel:       'Show:',
    catPublic:      'Shelters',
    catSchool:      'Schools',
    catParking:     'Parking',
    catNote:        '🏫 & 🅿️ — potential protected spaces',
    sidebarTitle:   'Nearest Results',
    sidebarSub:     'Enter an address or click "My Location"',
    emptyTitle:     'No search yet',
    emptySub:       'Enter an address above<br>or click "My Location"',
    noResults:      'No results found in this range',
    noResultsSub:   'Try increasing the search radius<br>or check a different address',
    foundX:     n   => `Found ${n} result${n !== 1 ? 's' : ''}`,
    inRadius:   r   => `within ${r}`,
    govLabel:   n   => `${n} from gov database`,
    osmLabel:   n   => `${n} from OSM`,
    dataNotice:     '🏚️ Shelters: OSM + National DB + gov.il (full data for Beer Sheva, Jerusalem & <strong>Tel Aviv</strong>). 🏫🅿️ Schools & parking: OSM data — <strong>potential protected spaces only</strong>.',
    myLocation:     '📍 Your location',
    gpsDetected:    '📍 GPS location detected',
    detectingGPS:   '⏳',
    detecting:      'Detecting…',
    searchingAddr:  'Searching address…',
    searchingFmt:   r => `Searching within ${r}…`,
    addrNotFound:   'Address not found – try to be more specific (city + street + number)',
    noGeo:          'Your browser does not support geolocation',
    geoDenied:      'Access denied – allow location access in your browser',
    geoUnavail:     'Location unavailable',
    geoTimeout:     'Location timeout',
    geoErr:         'Error detecting location',
    enterAddr:      'Please enter an address to search',
    loadErr:        'Error loading data: ',
    geoSearchErr:   'Search error: ',
    distFmt:   km   => km < 1 ? `${Math.round(km*1000)} m` : `${km.toFixed(1)} km`,
    popupDist:      'Distance:',
    govBadge:       '🏛️ gov.il',
    arcgisBadge:    '🏛️ National',
    osmBadge:       '🗺️ OSM',
    schoolBadge:    '🏫 School',
    parkingBadge:   '🅿️ Parking',
    wazeLabel:      '🗺️ Waze',
    gmapsLabel:     '📍 Google Maps',
  }
};

// ═══════════════════════════════════
// LANGUAGE STATE
// ═══════════════════════════════════
let currentLang = 'he';
const t = () => STRINGS[currentLang];

function toggleLang() { setLang(currentLang === 'he' ? 'en' : 'he'); }

function setLang(lang) {
  currentLang = lang;
  const s = t();

  document.documentElement.dir  = s.dir;
  document.documentElement.lang = s.lang;
  document.getElementById('lang-btn').textContent = lang === 'he' ? 'EN' : 'עב';

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (s[key] !== undefined && typeof s[key] === 'string') el.innerHTML = s[key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (s[key]) el.placeholder = s[key];
  });

  const sel = document.getElementById('radius');
  const cur = sel.value;
  sel.innerHTML = s.radiusOpts.map(([v, label]) =>
    `<option value="${v}"${v === cur ? ' selected' : ''}>${label}</option>`
  ).join('');
  if (!sel.value) sel.value = '1000';

  document.getElementById('data-notice').innerHTML = s.dataNotice;

  if (lastShelters !== null) {
    const filtered = getFiltered(lastShelters);
    renderList(filtered);
    renderMarkers(filtered);
    updateHeader(filtered.length, lastRadiusM, lastSources);
  }
}

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let map, userMarker, radiusCircle;
let shelterMarkers = [];
let userLat = null, userLon = null;
let activeId  = null;
let sugTimer  = null;

// Category filter state
let activeCategories = new Set(['public', 'school', 'parking']);

// Cache last full results for filtering without re-fetching
let lastShelters = null;
let lastRadiusM  = 1000;
let lastSources  = {};

// ═══════════════════════════════════
// CATEGORY FILTER
// ═══════════════════════════════════
function toggleCat(cat, btn) {
  if (activeCategories.has(cat)) {
    if (activeCategories.size === 1) return; // keep at least one active
    activeCategories.delete(cat);
    btn.classList.remove('active');
  } else {
    activeCategories.add(cat);
    btn.classList.add('active');
  }
  if (lastShelters) {
    const filtered = getFiltered(lastShelters);
    renderList(filtered);
    renderMarkers(filtered);
    updateHeader(filtered.length, lastRadiusM, lastSources);
  }
}

function getFiltered(shelters) {
  return shelters.filter(s => activeCategories.has(s.category || 'public'));
}

// ═══════════════════════════════════
// MAP
// ═══════════════════════════════════
function initMap(lat = 31.7683, lon = 35.2137, zoom = 12) {
  if (map) { map.setView([lat, lon], zoom); return; }

  map = L.map('map', { attributionControl: false }).setView([lat, lon], zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.control.attribution({ prefix: false })
    .addAttribution('© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors')
    .addTo(map);

  map.on('click', e => { setUser(e.latlng.lat, e.latlng.lng); loadShelters(); });
}

// ═══════════════════════════════════
// USER LOCATION
// ═══════════════════════════════════
function setUser(lat, lon) {
  userLat = lat; userLon = lon;
  if (!map) initMap(lat, lon, 15); else map.setView([lat, lon], 15);

  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.marker([lat, lon], {
    icon: L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;background:#ef4444;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8]
    })
  }).addTo(map).bindPopup(`<b>${t().myLocation}</b>`).openPopup();
}

function useGPS() {
  if (!navigator.geolocation) { showErr(t().noGeo); return; }
  const btn = document.getElementById('gps-btn');
  btn.disabled = true;
  btn.querySelector('[data-i18n]').textContent = t().detecting;
  showLoading(t().detectingGPS + ' ' + t().detecting);

  navigator.geolocation.getCurrentPosition(
    pos => {
      btn.disabled = false;
      btn.querySelector('[data-i18n]').textContent = t().gpsBtn;
      setUser(pos.coords.latitude, pos.coords.longitude);
      document.getElementById('addr').value = '';
      document.getElementById('addr').placeholder = t().gpsDetected;
      loadShelters();
    },
    err => {
      btn.disabled = false;
      btn.querySelector('[data-i18n]').textContent = t().gpsBtn;
      const msgs = { 1: t().geoDenied, 2: t().geoUnavail, 3: t().geoTimeout };
      showErr(msgs[err.code] || t().geoErr);
    },
    { timeout: 10000, maximumAge: 60000, enableHighAccuracy: true }
  );
}

// ═══════════════════════════════════
// GEOCODE (via server)
// ═══════════════════════════════════
async function geocode(q) {
  const r = await fetch(`/api/geocode?q=${encodeURIComponent(q)}`);
  if (!r.ok) throw new Error('geocode error ' + r.status);
  return r.json();
}

async function doSearch() {
  const q = document.getElementById('addr').value.trim();
  if (!q) { alert(t().enterAddr); return; }
  hideSug();
  showLoading(t().searchingAddr);
  try {
    const results = await geocode(q);
    if (!results.length) { showErr(t().addrNotFound); return; }
    setUser(+results[0].lat, +results[0].lon);
    loadShelters();
  } catch (e) { showErr(t().geoSearchErr + e.message); }
}

// Autocomplete
document.getElementById('addr').addEventListener('input', function () {
  clearTimeout(sugTimer);
  const v = this.value.trim();
  if (v.length < 2) { hideSug(); return; }
  sugTimer = setTimeout(() => fetchSug(v), 350);
});
document.getElementById('addr').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.addEventListener('click', e => { if (!e.target.closest('.input-wrap')) hideSug(); });

async function fetchSug(q) {
  try {
    const r = await geocode(q);
    if (!r.length) { hideSug(); return; }
    const box = document.getElementById('sug');
    box.innerHTML = r.slice(0, 5).map(item =>
      `<div class="sug-item" onclick="pickSug('${esc(item.display_name)}',${item.lat},${item.lon})">${esc(item.display_name)}</div>`
    ).join('');
    box.style.display = 'block';
  } catch { hideSug(); }
}
function pickSug(name, lat, lon) {
  document.getElementById('addr').value = name;
  hideSug();
  setUser(+lat, +lon);
  loadShelters();
}
function hideSug() { document.getElementById('sug').style.display = 'none'; }

// ═══════════════════════════════════
// LOAD SHELTERS (from server)
// ═══════════════════════════════════
async function loadShelters() {
  if (userLat === null) return;
  const radiusM    = +document.getElementById('radius').value;
  const radiusLabel = document.getElementById('radius').selectedOptions[0]?.text || radiusM + 'm';
  showLoading(t().searchingFmt(radiusLabel));

  try {
    const r = await fetch(`/api/shelters?lat=${userLat}&lon=${userLon}&radius=${radiusM}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    lastShelters = data.shelters;
    lastRadiusM  = radiusM;
    lastSources  = data.sources;

    document.getElementById('data-notice').style.display = 'block';
    document.getElementById('data-notice').innerHTML = t().dataNotice;

    updateRadius(radiusM);
    const filtered = getFiltered(data.shelters);
    renderList(filtered);
    renderMarkers(filtered);
    updateHeader(filtered.length, radiusM, data.sources);
  } catch (e) {
    showErr(t().loadErr + e.message);
  }
}

function onRadiusChange() { if (userLat !== null) loadShelters(); }

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function renderList(shelters) {
  const list = document.getElementById('list');
  if (!shelters.length) {
    list.innerHTML = `<div class="state">
      <div class="state-icon">🔍</div>
      <div class="state-title">${t().noResults}</div>
      <div class="state-sub">${t().noResultsSub}</div>
    </div>`;
    return;
  }

  list.innerHTML = shelters.map((s, i) => {
    const cat   = s.category || 'public';
    const dCls  = cat === 'school' ? 'school' : cat === 'parking' ? 'parking'
                  : s.dist < 0.5 ? 'near' : s.dist < 2 ? 'medium' : 'far';
    const addr  = [s.address, s.city].filter(Boolean).join(', ');
    const waze  = `https://waze.com/ul?ll=${s.lat},${s.lon}&navigate=yes`;
    const gmaps = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}`;

    let catBadge;
    if (cat === 'school') {
      catBadge = `<span class="pill pill-school">${t().schoolBadge}</span>`;
    } else if (cat === 'parking') {
      catBadge = `<span class="pill pill-parking">${t().parkingBadge}</span>`;
    } else {
      const srcBadge = (s.source === 'gov' || s.source === 'arcgis')
        ? (s.source === 'arcgis' ? t().arcgisBadge : t().govBadge)
        : t().osmBadge;
      catBadge = `<span class="pill pill-tag">${srcBadge}</span>`;
    }

    return `<div class="card cat-${cat}" id="card-${esc(s.id)}" onclick="focusShelter('${esc(s.id)}',${s.lat},${s.lon},${i})">
      <div class="rank ${dCls}">${i + 1}</div>
      <div class="card-body">
        <div class="card-name" title="${esc(s.name)}">${esc(s.name)}</div>
        ${addr ? `<div class="card-addr">📍 ${esc(addr)}</div>` : ''}
        <div class="card-meta">
          <span class="pill pill-dist ${cat === 'school' || cat === 'parking' ? '' : dCls}">🚶 ${t().distFmt(s.dist)}</span>
          ${s.capacity ? `<span class="pill pill-tag">👥 ${esc(String(s.capacity))}</span>` : ''}
          ${catBadge}
        </div>
        <div class="nav-links">
          <a href="${waze}" target="_blank" class="nav-link" onclick="event.stopPropagation()">${t().wazeLabel}</a>
          <a href="${gmaps}" target="_blank" class="nav-link" onclick="event.stopPropagation()">${t().gmapsLabel}</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function markerColor(s) {
  if (s.category === 'school')  return '#7c3aed';          // purple
  if (s.category === 'parking') return '#ea580c';          // orange-red
  return s.dist < 0.5 ? '#16a34a' : s.dist < 2 ? '#d97706' : '#64748b';
}

function renderMarkers(shelters) {
  shelterMarkers.forEach(m => map.removeLayer(m));
  shelterMarkers = [];

  shelters.slice(0, 150).forEach((s, i) => {
    const color = markerColor(s);
    const icon  = L.divIcon({
      className: '',
      html: `<div style="width:26px;height:26px;background:${color};color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.35);border:2px solid #fff;">${i+1}</div>`,
      iconSize: [26, 26], iconAnchor: [13, 13]
    });
    const addr = [s.address, s.city].filter(Boolean).join(', ');
    const m = L.marker([s.lat, s.lon], { icon })
      .addTo(map)
      .bindPopup(`<div dir="${t().dir}"><b>${esc(s.name)}</b>${addr ? '<br>' + esc(addr) : ''}<br><b>${t().popupDist} ${t().distFmt(s.dist)}</b></div>`);
    m.on('click', () => {
      const card = document.getElementById('card-' + s.id);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
    shelterMarkers.push(m);
  });

  if (shelters.length) {
    const bounds = L.latLngBounds(L.latLng(userLat, userLon), L.latLng(userLat, userLon));
    shelters.slice(0, 20).forEach(s => bounds.extend(L.latLng(s.lat, s.lon)));
    map.fitBounds(bounds.pad(0.12), { maxZoom: 16 });
  }
}

function focusShelter(id, lat, lon, idx) {
  if (activeId) {
    const prev = document.getElementById('card-' + activeId);
    if (prev) prev.classList.remove('active');
  }
  activeId = id;
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('active');
  map.setView([lat, lon], 17);
  if (shelterMarkers[idx]) shelterMarkers[idx].openPopup();
}

function updateRadius(radiusM) {
  if (!userLat) return;
  if (radiusCircle) map.removeLayer(radiusCircle);
  radiusCircle = L.circle([userLat, userLon], {
    radius: radiusM, color: '#2563eb', fillColor: '#2563eb',
    fillOpacity: .05, weight: 1.5, dashArray: '6,5'
  }).addTo(map);
}

function updateHeader(count, radiusM, sources) {
  const sel        = document.getElementById('radius');
  const radiusLabel = sel.selectedOptions[0]?.text || radiusM + 'm';
  const cats = [];
  if (sources.public  > 0) cats.push(`🏚️ ${sources.public}`);
  if (sources.school  > 0) cats.push(`🏫 ${sources.school}`);
  if (sources.parking > 0) cats.push(`🅿️ ${sources.parking}`);

  document.getElementById('result-ttl').textContent = t().foundX(count);
  document.getElementById('result-sub').textContent =
    t().inRadius(radiusLabel) + (cats.length ? ' · ' + cats.join(' · ') : '');
}

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function showLoading(msg) {
  document.getElementById('list').innerHTML =
    `<div class="loading"><div class="spinner"></div><div class="loading-txt">${msg}</div></div>`;
}
function showErr(msg) {
  document.getElementById('list').innerHTML = `<div class="err-box">⚠️ ${msg}</div>`;
}
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════
// BOOT
// ═══════════════════════════════════
setLang('he');
initMap();
</script>
</body>
</html>
